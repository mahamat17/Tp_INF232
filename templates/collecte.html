{% extends "base.html" %}

{% block title %}Collecte des données{% endblock %}

{% block content %}

<h2>📝 Formulaire de collecte</h2>

<form method="POST" class="form-collecte">

    <fieldset>
        <legend>👤 Informations personnelles</legend>
        
        <label>Nom *</label>
        <input type="text" name="nom" required>
        
        <label>Prénom *</label>
        <input type="text" name="prenom" required>
        
        <label>Âge *</label>
        <input type="number" name="age" min="0" max="120" required>
        
        <label>Sexe *</label>
        <select name="sexe" required>
            <option value="Masculin">Masculin</option>
            <option value="Féminin">Féminin</option>
        </select>
        
        <label>Région *</label>
        <select name="region" required>
            <option value="">Sélectionnez</option>
            {% for r in regions %}
                <option value="{{ r }}">{{ r }}</option>
            {% endfor %}
        </select>
        
        <label>Ville</label>
        <input type="text" name="ville">
        
        <label>Profession</label>
        <input type="text" name="profession">
    </fieldset>
    
    <fieldset>
        <legend>🍽️ Alimentation</legend>
        
        <label>Aliment principal consommé *</label>
        <select name="aliment_principal" required>
            {% for a in aliments %}
                <option value="{{ a }}">{{ a }}</option>
            {% endfor %}
        </select>
        
        <label>Aliments secondaires</label>
        <input type="text" name="aliments_secondaires" placeholder="Ex: riz, sauce graine...">
        
        <label>Nombre de repas par jour *</label>
        <input type="number" name="nb_repas" min="1" max="6" value="3" required>
        
        <label>Budget alimentaire quotidien (FCFA) *</label>
        <input type="number" name="budget" min="0" step="500" value="5000" required>
        
        <label>Satisfaction alimentaire (1-10) *</label>
        <input type="range" name="satisfaction" min="1" max="10" value="5" oninput="this.nextElementSibling.value = this.value">
        <output>5</output>
        
        <label>Commentaire</label>
        <textarea name="commentaire" rows="3"></textarea>
    </fieldset>
    
    <button type="submit" class="btn-primary">💾 Enregistrer</button>
</form>

{% endblock %}
